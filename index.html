<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Music Player</title>
  <link rel="stylesheet" href="./css/style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="bg-blur" id="bgBlur"></div>

<div class="app">

  <!-- Header -->
  <header class="glass-card header">
    <button class="icon-btn" id="btnBack">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <span class="header-title">Музыка</span>
    <button class="icon-btn" id="btnSearch">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </header>

  <!-- Search Panel -->
  <div class="search-panel glass-card" id="searchPanel" style="display:none">
    <div class="search-input-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Исполнитель или трек..." autocomplete="off" />
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <!-- Player -->
  <main class="player" id="playerView">

    <!-- Album Art -->
    <div class="artwork-wrap">
      <div class="artwork glass-card" id="artwork">
        <div class="artwork-placeholder">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
          </svg>
        </div>
        <img id="artworkImg" src="" alt="" />
      </div>
    </div>

    <!-- Track Info -->
    <div class="track-info">
      <div class="track-title" id="trackTitle">Выбери трек</div>
      <div class="track-artist" id="trackArtist">—</div>
      <button class="fav-btn" id="btnFav" title="В избранное">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    </div>

    <!-- Progress Bar -->
    <div class="progress-wrap glass-card">
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-thumb" id="progressThumb"></div>
      </div>
      <div class="progress-time">
        <span id="timeElapsed">0:00</span>
        <span id="timeDuration">0:00</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls glass-card">
      <button class="ctrl-btn" id="btnShuffle" title="Перемешать">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/>
          <line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
      </button>
      <button class="ctrl-btn ctrl-prev" id="btnPrev">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
      <button class="ctrl-btn ctrl-play" id="btnPlay">
        <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>
      <button class="ctrl-btn ctrl-next" id="btnNext">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="btnRepeat" title="Повтор">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="17 1 21 5 17 9"/>
          <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/>
          <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
    </div>

    <!-- Volume -->
    <div class="volume-wrap">
      <svg viewBox="0 0 24 24" fill="currentColor" class="vol-icon">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      </svg>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" class="volume-slider" />
      <svg viewBox="0 0 24 24" fill="currentColor" class="vol-icon">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
    </div>

    <!-- Queue -->
    <div class="queue-section">
      <div class="queue-title">Далее в очереди</div>
      <div class="queue-list" id="queueList"></div>
    </div>

  </main>

</div>

<audio id="audioPlayer" preload="auto"></audio>

<script src="./js/app.js"></script>
</body>
</html>
