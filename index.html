<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Sound</title>
  <link rel="stylesheet" href="./css/style.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<!-- Живой фон -->
<div class="bg-canvas" id="bgCanvas">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>
</div>

<div class="app">

  <!-- ══════════ TAB: ПОИСК ══════════ -->
  <div class="tab-page active" id="tabSearch">

    <div class="page-header glass-bar">
      <span class="page-title">Поиск</span>
    </div>

    <div class="search-wrap">
      <div class="search-bar glass-input">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="searchInput" type="text" placeholder="Исполнитель или трек" autocomplete="off" spellcheck="false"/>
        <button class="clear-btn" id="clearBtn" style="display:none">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </div>

    <div class="scroll-area" id="searchScroll">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </div>
        <p>Найди свою музыку</p>
      </div>
      <div class="spinner-wrap" id="spinnerWrap" style="display:none"><div class="spinner"></div></div>
      <div class="results-list" id="resultsList"></div>
    </div>
  </div>

  <!-- ══════════ TAB: ПЛЕЙЛИСТЫ ══════════ -->
  <div class="tab-page" id="tabPlaylists">
    <div class="page-header glass-bar">
      <span class="page-title">Плейлисты</span>
    </div>
    <div class="scroll-area">
      <div class="placeholder">
        <div class="placeholder-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg></div>
        <p>Плейлисты появятся здесь</p>
      </div>
    </div>
  </div>

  <!-- ══════════ TAB: ИЗБРАННОЕ ══════════ -->
  <div class="tab-page" id="tabFavs">
    <div class="page-header glass-bar">
      <span class="page-title">Избранное</span>
    </div>
    <div class="scroll-area">
      <div class="results-list" id="favsList"></div>
      <div class="placeholder" id="favsPlaceholder">
        <div class="placeholder-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
        <p>Добавляй треки через ❤️</p>
      </div>
    </div>
  </div>

  <!-- ══════════ TAB: ПРОФИЛЬ ══════════ -->
  <div class="tab-page" id="tabProfile">
    <div class="page-header glass-bar">
      <span class="page-title">Профиль</span>
    </div>
    <div class="scroll-area" style="padding:20px 16px; display:flex; flex-direction:column; gap:12px;">
      <div class="profile-card glass-card">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div class="profile-info">
          <div class="profile-name" id="profileName">Пользователь</div>
          <div class="profile-sub">Sound Music Player</div>
        </div>
      </div>
      <div class="settings-group glass-card">
        <div class="settings-item">
          <span>Качество аудио</span><span class="settings-val">192 kbps</span>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-item">
          <span>Кеш треков</span><span class="settings-val">—</span>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-item">
          <span>Версия</span><span class="settings-val">1.0.0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════ Мини-плеер ══════════ -->
  <div class="mini-player glass-player" id="miniPlayer" style="display:none">
    <div class="mini-progress" id="miniProgress" style="width:0%"></div>
    <div class="mini-art-wrap">
      <img class="mini-art" id="miniArt" src="" alt="" style="display:none"/>
      <div class="mini-art-ph" id="miniArtPh"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
    </div>
    <div class="mini-info">
      <div class="mini-title" id="miniTitle">—</div>
      <div class="mini-artist" id="miniArtist">—</div>
    </div>
    <button class="mini-btn" id="miniFavBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
    <button class="mini-btn mini-play" id="miniPlayBtn">
      <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
  </div>

  <!-- ══════════ Tab Bar ══════════ -->
  <nav class="tab-bar glass-tabbar">
    <button class="tab-btn active" data-tab="tabSearch">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Поиск</span>
    </button>
    <button class="tab-btn" data-tab="tabPlaylists">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>Плейлисты</span>
    </button>
    <button class="tab-btn" data-tab="tabFavs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>Избранное</span>
    </button>
    <button class="tab-btn" data-tab="tabProfile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Профиль</span>
    </button>
  </nav>

</div>

<audio id="audio" preload="auto"></audio>
<script src="./js/app.js"></script>
</body>
</html>
