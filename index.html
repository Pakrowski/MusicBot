<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Sound</title>
  <link rel="stylesheet" href="./css/style.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<!-- Фоновый gradient (меняется под обложку) -->
<div class="bg-gradient" id="bgGradient"></div>

<div class="app">

  <!-- Поиск -->
  <div class="search-wrap">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Исполнитель или трек" autocomplete="off" spellcheck="false"/>
      <button class="clear-btn" id="clearBtn" style="display:none">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
  </div>

  <!-- Список результатов -->
  <div class="results-wrap" id="resultsWrap">
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      <p>Введи название трека</p>
    </div>
    <div class="spinner-wrap" id="spinnerWrap" style="display:none">
      <div class="spinner"></div>
    </div>
    <div class="results-list" id="resultsList"></div>
  </div>

  <!-- Нижний плеер -->
  <div class="bottom-player" id="bottomPlayer" style="display:none">
    <div class="player-art-wrap">
      <img class="player-art" id="playerArt" src="" alt=""/>
      <div class="player-art-ph" id="playerArtPh">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>
    </div>
    <div class="player-info">
      <div class="player-title" id="playerTitle"></div>
      <div class="player-artist" id="playerArtist"></div>
    </div>
    <button class="player-fav" id="playerFav">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </button>
    <button class="player-play" id="playerPlayBtn">
      <svg id="playerIconPlay" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <svg id="playerIconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
  </div>

</div>

<audio id="audio" preload="auto"></audio>
<script src="./js/app.js"></script>
</body>
</html>
